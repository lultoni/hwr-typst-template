[package]
name = "hwr-berlin"
version = "0.1.0"
compiler = "0.13.1"
entrypoint = "lib.typ"
repository = "https://github.com/TODO/hwr-typst-template"
authors = []
license = "MIT"
description = "Typst template for academic papers at HWR Berlin (Wirtschaftsinformatik), compliant with the January 2025 HWR guidelines."
categories = ["thesis"]
keywords = ["thesis", "university", "hwr", "berlin", "wirtschaftsinformatik"]
disciplines = ["computer-science"]
exclude = [".github", "reference-templates", "hwr-richtlinien", ".claude", "requirements"]

[dependencies]
"@preview/linguify:0.5.0" = {}
"@preview/glossarium:0.5.10" = {}

[template]
path = "template"
entrypoint = "main.typ"
